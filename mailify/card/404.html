<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mailify Card - OSOTECHS</title>
    
    <script>
        // Get the card ID from the URL path
        const path = window.location.pathname;
        const segments = path.split('/').filter(s => s);
        
        // Find the card ID (it should be the last segment)
        let cardId = segments[segments.length - 1];
        
        // If the URL ends with /card/ or /mailify/card/, use a default
        if (!cardId || cardId === 'card' || cardId === 'mailify') {
            cardId = 'unknown';
        }
        
        // Redirect to the actual page with the card ID as a query parameter
        window.location.href = `/mailify/card/index.html?id=${cardId}`;
    </script>
    
    <style>
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: sans-serif;
            text-align: center;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size:48px;">📧</div>
        <h2>Loading your card...</h2>
        <div class="spinner"></div>
        <p style="color:#94a3b8;font-size:14px;">Redirecting to your Mailify card</p>
    </div>
</body>
</html>
