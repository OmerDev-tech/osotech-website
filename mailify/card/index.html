<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mailify Card - OSOTECHS</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0f172a; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 420px; width: 100%; background: #1e293b; border-radius: 24px; padding: 40px 30px; border: 1px solid #334155; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo { width: 80px; height: 80px; background: #3b82f6; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; font-weight: 700; color: white; }
        h1 { color: #f1f5f9; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 16px; margin-bottom: 30px; }
        .card-id { background: #0f172a; border-radius: 12px; padding: 12px; color: #3b82f6; font-family: monospace; font-size: 18px; letter-spacing: 2px; margin-bottom: 25px; border: 1px solid #334155; }
        .profile-preview { display: flex; align-items: center; gap: 15px; background: #0f172a; border-radius: 16px; padding: 15px 20px; margin-bottom: 25px; border: 1px solid #334155; }
        .profile-avatar { width: 56px; height: 56px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; color: white; flex-shrink: 0; }
        .profile-info { text-align: left; }
        .profile-info .name { color: #f1f5f9; font-size: 18px; font-weight: 600; }
        .profile-info .title { color: #94a3b8; font-size: 14px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 5px; }
        .btn { padding: 14px 20px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: scale(1.02); }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-outline:hover { border-color: #3b82f6; color: #3b82f6; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; transform: scale(1.02); }
        .divider { display: flex; align-items: center; gap: 15px; color: #475569; font-size: 13px; margin: 15px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #334155; }
        .footer { margin-top: 25px; color: #475569; font-size: 12px; }
        .footer a { color: #3b82f6; text-decoration: none; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-message { display: flex; align-items: center; justify-content: center; gap: 10px; color: #94a3b8; font-size: 14px; margin-bottom: 20px; padding: 12px; background: #0f172a; border-radius: 10px; border: 1px solid #334155; }
        .app-icons { display: flex; gap: 12px; justify-content: center; margin: 10px 0; }
        .app-icon { width: 48px; height: 48px; border-radius: 12px; background: #0f172a; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.3s; text-decoration: none; color: #f1f5f9; }
        .app-icon:hover { border-color: #3b82f6; transform: scale(1.05); }
        .error-text { color: #ef4444; }
        .success-text { color: #10b981; }
        .loading-text { color: #3b82f6; }
        .api-error-box { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; border-radius: 8px; padding: 12px; margin-bottom: 15px; display: none; }
        .api-error-box .error-title { color: #ef4444; font-weight: bold; font-size: 14px; }
        .api-error-box .error-detail { color: #94a3b8; font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📧</div>
        <h1>Mailify Card</h1>
        <p class="subtitle">Premium Digital Business Card</p>
        
        <div class="card-id" id="cardId">Loading...</div>
        
        <div id="apiErrorBox" class="api-error-box">
            <div class="error-title">⚠️ Connection Error</div>
            <div class="error-detail" id="errorDetail">Unable to connect to server. Please check your internet connection.</div>
        </div>
        
        <div class="status-message" id="statusMessage">
            <span class="spinner"></span>
            <span>Loading card details...</span>
        </div>
        
        <div class="profile-preview" id="profilePreview">
            <div class="profile-avatar" id="avatar">U</div>
            <div class="profile-info">
                <div class="name" id="userName">Loading...</div>
                <div class="title" id="userTitle">Business Professional</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="openApp()">📱 Open in App</button>
            <div class="divider">or</div>
            <button class="btn btn-success" onclick="saveContact()">💾 Save Contact</button>
            <button class="btn btn-outline" onclick="shareCard()">📤 Share Card</button>
        </div>
        
        <div class="divider">Download App</div>
        <div class="app-icons">
            <a href="#" class="app-icon" title="iOS App">🍎</a>
            <a href="https://play.google.com/store/apps/details?id=com.mailify.app" class="app-icon" title="Android App">🤖</a>
            <a href="https://osotechs.com" class="app-icon" title="Web App">🌐</a>
        </div>
        
        <div class="footer">
            <p>Powered by <a href="https://osotechs.com">OSOTECHS</a></p>
            <p style="margin-top: 5px;">© 2026 Mailify. All rights reserved.</p>
        </div>
    </div>

    <script>
        // ============================================
        // GET CARD ID FROM URL
        // ============================================
        function getCardId() {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id');
            
            if (!id) {
                const path = window.location.pathname;
                const segments = path.split('/').filter(s => s);
                const lastSegment = segments[segments.length - 1];
                if (lastSegment && (lastSegment.startsWith('MF-') || lastSegment.startsWith('MC-'))) {
                    id = lastSegment;
                } else {
                    id = 'unknown';
                }
            }
            return id;
        }
        
        const cardId = getCardId();
        
        // Try HTTPS first, fallback to HTTP
        const API_URLS = [
            'https://mailifyapp.duckdns.org/mailify_backend/api/get_card.php',
            'http://mailifyapp.duckdns.org/mailify_backend/api/get_card.php'
        ];
        
        // ============================================
        // FETCH CARD DETAILS WITH FALLBACK
        // ============================================
        async function fetchCardDetails() {
            const cardIdEl = document.getElementById('cardId');
            const statusEl = document.getElementById('statusMessage');
            const nameEl = document.getElementById('userName');
            const titleEl = document.getElementById('userTitle');
            const avatarEl = document.getElementById('avatar');
            const errorBox = document.getElementById('apiErrorBox');
            const errorDetail = document.getElementById('errorDetail');
            
            cardIdEl.textContent = cardId;
            
            if (cardId === 'unknown') {
                statusEl.innerHTML = `<span>⚠️</span><span>Invalid card URL</span>`;
                return;
            }
            
            // Try each API URL
            let lastError = null;
            
            for (const apiUrl of API_URLS) {
                try {
                    console.log('Fetching card:', cardId);
                    console.log('API URL:', `${apiUrl}?card_id=${encodeURIComponent(cardId)}`);
                    
                    const response = await fetch(`${apiUrl}?card_id=${encodeURIComponent(cardId)}`, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                        },
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    console.log('API Response:', data);
                    
                    // Hide error box on success
                    errorBox.style.display = 'none';
                    
                    if (data.success && data.card) {
                        const card = data.card;
                        
                        // Use user data from the 'user' object or from card root
                        const userData = card.user || card;
                        
                        // Display name
                        const displayName = userData.display_name || userData.business_name || userData.full_name || userData.username || 'Mailify User';
                        nameEl.textContent = displayName;
                        
                        // Title
                        const userTitle = userData.title || userData.business_type || 'Business Professional';
                        titleEl.textContent = userTitle;
                        
                        // Avatar
                        avatarEl.textContent = displayName.charAt(0).toUpperCase();
                        
                        // Profile image
                        if (userData.profile_image) {
                            avatarEl.style.backgroundImage = `url(${userData.profile_image})`;
                            avatarEl.style.backgroundSize = 'cover';
                            avatarEl.style.backgroundPosition = 'center';
                            avatarEl.textContent = '';
                        }
                        
                        // Status
                        const isActive = card.status === 'active';
                        statusEl.innerHTML = `
                            <span>${isActive ? '✅' : '⏳'}</span>
                            <span class="${isActive ? 'success-text' : 'loading-text'}">
                                ${isActive ? 'Card ready! Tap to open in app.' : 'Card pending activation.'}
                            </span>
                        `;
                        
                        if (isActive) {
                            setTimeout(openApp, 1500);
                        }
                        
                        return; // Success - exit the loop
                    } else {
                        statusEl.innerHTML = `
                            <span>⚠️</span>
                            <span class="error-text">${data.message || 'Card not found'}</span>
                        `;
                        nameEl.textContent = 'Card Not Found';
                        titleEl.textContent = 'Please check the card ID';
                        return;
                    }
                } catch (error) {
                    console.error(`Error with API URL ${apiUrl}:`, error);
                    lastError = error;
                    // Continue to next API URL
                }
            }
            
            // All APIs failed
            errorBox.style.display = 'block';
            errorDetail.textContent = `Failed to connect to server. Please check your internet connection and try again.`;
            
            statusEl.innerHTML = `
                <span>⚠️</span>
                <span class="error-text">Could not load card details. Please try again.</span>
            `;
            nameEl.textContent = 'Connection Error';
            titleEl.textContent = 'Check your internet connection';
        }
        
        // ============================================
        // OPEN APP
        // ============================================
        function openApp() {
            const deepLink = `mailify://card/${cardId}`;
            const androidIntent = `intent://card/${cardId}#Intent;package=com.mailify.app;scheme=mailify;end`;
            
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = deepLink;
            document.body.appendChild(iframe);
            
            window.location.href = androidIntent;
            
            setTimeout(() => {
                const statusEl = document.getElementById('statusMessage');
                statusEl.innerHTML = `
                    <span>📱</span>
                    <span>App not installed? Download below!</span>
                `;
                document.querySelector('.app-icons').style.display = 'flex';
            }, 2500);
        }
        
        // ============================================
        // SAVE CONTACT
        // ============================================
        function saveContact() {
            const name = document.getElementById('userName').textContent;
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${name}
ORG:OSOTECHS
TEL:08135103329
EMAIL:mailifyservice@gmail.com
URL:https://osotechs.com/mailify/card/index.html?id=${cardId}
END:VCARD`;
            
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${cardId}.vcf`;
            link.click();
            URL.revokeObjectURL(url);
            
            const statusEl = document.getElementById('statusMessage');
            statusEl.innerHTML = `<span>✅</span><span class="success-text">Contact saved successfully!</span>`;
        }
        
        // ============================================
        // SHARE CARD
        // ============================================
        function shareCard() {
            const url = `https://osotechs.com/mailify/card/index.html?id=${cardId}`;
            const name = document.getElementById('userName').textContent;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Mailify Card',
                    text: `Check out my Mailify card: ${name}`,
                    url: url
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    const statusEl = document.getElementById('statusMessage');
                    statusEl.innerHTML = `<span>✅</span><span class="success-text">Link copied to clipboard!</span>`;
                });
            }
        }
        
        // ============================================
        // LOAD ON PAGE START
        // ============================================
        window.onload = function() {
            fetchCardDetails();
        };
    </script>

</body>
</html>
